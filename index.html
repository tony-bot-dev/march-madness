<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madness Relief UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #141414;
            --orange: #ff5c00;
            --orange-muted: #853100;
            --text-main: #f0f0f0;
            --text-dim: #707070;
            --shadow-light: rgba(255, 255, 255, 0.03);
            --shadow-dark: rgba(0, 0, 0, 0.8);
            --pebble-grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* The Pebbled Topographic Texture Layer */
        .texture-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            opacity: 0.15;
            background-image: var(--pebble-grain);
            mix-blend-mode: overlay;
        }

        .relief-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 4rem 2rem;
            position: relative;
        }

        /* Topographic Lines Background */
        .topo-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, var(--orange-muted) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #1a1a1a 0%, transparent 50%);
            opacity: 0.4;
        }

        .topo-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-radial-gradient(circle at 50% 50%, transparent 0, transparent 40px, rgba(255, 92, 0, 0.05) 41px, transparent 42px);
            mask-image: linear-gradient(to bottom, black, transparent);
        }

        /* Typography */
        h1 {
            font-size: clamp(4rem, 12vw, 10rem);
            line-height: 0.85;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            margin-bottom: 2rem;
            color: var(--text-main);
            position: relative;
        }

        .data-mono {
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            color: var(--orange);
        }

        /* Header Layout */
        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .header-mascot {
            width: clamp(160px, 20vw, 280px);
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 10px 30px rgba(255, 92, 0, 0.3));
            margin-right: 6rem;
        }

        @media (max-width: 600px) {
            .header-row {
                flex-direction: column;
                text-align: center;
            }
            .header-mascot {
                order: -1;
                width: 140px;
            }
        }

        /* The Relief Card */
        .relief-card {
            background: var(--surface);
            padding: 2px; /* Border simulation */
            border-radius: 40px;
            position: relative;
            box-shadow: 
                20px 20px 60px var(--shadow-dark),
                -5px -5px 20px var(--shadow-light);
            overflow: hidden;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .relief-card:hover {
            transform: translateY(-10px) scale(1.01);
        }

        .relief-inner {
            background: var(--surface);
            padding: 3rem;
            border-radius: 38px;
            position: relative;
            z-index: 1;
            /* Neumorphic Inner Relief */
            box-shadow: 
                inset 10px 10px 20px rgba(0,0,0,0.5),
                inset -5px -5px 15px rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Matchup Layout */
        .matchup-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 2rem;
            margin-top: 4rem;
        }

        .team {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .team.right {
            text-align: right;
            align-items: flex-end;
        }

        .seed {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            color: var(--orange);
            opacity: 0.6;
        }

        .team-name {
            font-size: 3rem;
            font-weight: 900;
            line-height: 1;
        }

        .score-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 5rem;
            font-weight: 300;
            background: linear-gradient(180deg, #fff 0%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            padding: 0 2rem;
            border-left: 1px solid rgba(255,255,255,0.1);
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        /* Pebbled UI Elements */
        .cta-wrap {
            margin-top: 4rem;
            text-align: center;
        }

        .pebble-cta {
            display: inline-flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.5rem 3rem;
            background: var(--orange);
            color: black;
            text-decoration: none;
            border-radius: 100px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 15px 30px rgba(255, 92, 0, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .pebble-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(255, 92, 0, 0.5);
            background: #ff7a33;
        }

        .pebble-cta::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image: var(--pebble-grain);
            opacity: 0.3;
            pointer-events: none;
        }

        /* Countdown Section */
        .countdown-section {
            margin-top: 5rem;
            text-align: center;
        }

        .countdown-heading {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            color: var(--orange);
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        .countdown-grid {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .countdown-tile {
            background: var(--surface);
            border-radius: 16px;
            padding: 1.5rem 1.8rem;
            min-width: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            position: relative;
            box-shadow:
                8px 8px 24px var(--shadow-dark),
                -2px -2px 8px var(--shadow-light),
                inset 0 1px 0 rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.04);
        }

        .countdown-tile::after {
            content: "";
            position: absolute;
            left: 8%;
            right: 8%;
            top: 50%;
            height: 1px;
            background: rgba(0,0,0,0.4);
            box-shadow: 0 1px 0 rgba(255,255,255,0.03);
        }

        .countdown-val {
            font-family: 'Inter', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1;
            color: var(--text-main);
        }

        .countdown-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .countdown-info {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin-top: 2rem;
        }

        .countdown-info-item {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 0.05em;
        }

        .countdown-info-item span {
            color: var(--text-main);
            font-weight: 900;
        }

        @media (max-width: 500px) {
            .countdown-tile {
                min-width: 70px;
                padding: 1rem 1rem;
            }
            .countdown-val {
                font-size: 2.5rem;
            }
            .countdown-info {
                flex-direction: column;
                gap: 0.5rem;
                align-items: center;
            }
        }

        /* Floating Nav */
        .bracket-nav {
            position: absolute;
            right: 2rem;
            top: 4rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .nav-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--orange);
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-dot.active {
            background: var(--orange);
            box-shadow: 0 0 15px var(--orange);
        }

        @media (max-width: 900px) {
            .matchup-grid {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .team.right { text-align: center; align-items: center; }
            .score-display {
                border: none;
                border-top: 1px solid rgba(255,255,255,0.1);
                border-bottom: 1px solid rgba(255,255,255,0.1);
                padding: 1rem 0;
            }
            .countdown-grid { flex-wrap: wrap; }
        }

        /* Animation Keyframes */
        @keyframes reveal {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .animate-reveal {
            animation: reveal 1s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }
    </style>
</head>
<body>
    <div class="texture-overlay"></div>
    <div class="topo-bg">
        <div class="topo-lines"></div>
    </div>

    <div class="relief-container">
        <nav class="bracket-nav">
            <div class="nav-dot active"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
            <div class="nav-dot"></div>
        </nav>

        <header class="header-row animate-reveal" style="animation-delay: 0.1s;">
            <div>
                <p class="data-mono">// MARCH TO THE TITLE 2026</p>
                <h1>TONY'S<br>MADNESS</h1>
            </div>
            <img src="images/dunk.png" alt="Tony's Mascot" class="header-mascot">
        </header>

        <section class="relief-card animate-reveal" style="animation-delay: 0.3s;">
            <div class="relief-inner">
                <div class="data-mono" style="margin-bottom: 2rem; display: flex; justify-content: space-between;">
                    <span>Live • Round of 16</span>
                    <span>Arena: The Colosseum, LV</span>
                </div>
                
                <div class="matchup-grid">
                    <div class="team">
                        <span class="seed">#02</span>
                        <span class="team-name">NORTHERN<br>LOBSTERS</span>
                    </div>
                    
                    <div class="score-display">
                        84—79
                    </div>

                    <div class="team right">
                        <span class="seed">#07</span>
                        <span class="team-name">COASTAL<br>SHARKS</span>
                    </div>
                </div>

                <div style="margin-top: 3rem; display: flex; gap: 1rem;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--orange)">
                        <circle cx="12" cy="12" r="10" fill-opacity="0.2"/>
                        <circle cx="12" cy="12" r="4"/>
                    </svg>
                    <span class="data-mono" style="color: var(--text-dim)">04:12 Remaining • 2nd Half</span>
                </div>
            </div>
        </section>

        <div class="countdown-section animate-reveal" style="animation-delay: 0.5s;">
            <p class="countdown-heading">// Teams Announced In</p>
            <div class="countdown-grid">
                <div class="countdown-tile">
                    <span class="countdown-val" id="cd-days">15</span>
                    <span class="countdown-label">Days</span>
                </div>
                <div class="countdown-tile">
                    <span class="countdown-val" id="cd-hours">08</span>
                    <span class="countdown-label">Hours</span>
                </div>
                <div class="countdown-tile">
                    <span class="countdown-val" id="cd-mins">17</span>
                    <span class="countdown-label">Mins</span>
                </div>
                <div class="countdown-tile">
                    <span class="countdown-val" id="cd-secs">07</span>
                    <span class="countdown-label">Secs</span>
                </div>
            </div>
            <div class="countdown-info">
                <span class="countdown-info-item">Brackets Lock <span>Mar 19</span></span>
                <span class="countdown-info-item">Entry Fee <span style="color: var(--orange)">$25</span></span>
            </div>
        </div>

        <div class="cta-wrap animate-reveal" style="animation-delay: 0.7s;">
            <a href="#" class="pebble-cta">
                Enter Tournament Hub
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </a>
        </div>
    </div>

    <script>
        // Subtle mouse tracking for relief shadows
        const card = document.querySelector('.relief-card');
        const container = document.body;

        container.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
            
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg) translateY(-10px)`;
            
            // Adjust lighting based on mouse position
            const inner = document.querySelector('.relief-inner');
            inner.style.boxShadow = `
                inset ${xAxis * 2}px ${yAxis * 2}px 20px rgba(0,0,0,0.5),
                inset ${-xAxis * 2}px ${-yAxis * 2}px 15px rgba(255,255,255,0.02)
            `;
        });

        container.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        // Live countdown to Selection Sunday (March 15, 2026)
        const cdDays = document.getElementById('cd-days');
        const cdHours = document.getElementById('cd-hours');
        const cdMins = document.getElementById('cd-mins');
        const cdSecs = document.getElementById('cd-secs');
        const targetDate = new Date('2026-03-15T00:00:00');

        function pad(n) { return String(n).padStart(2, '0'); }

        function updateCountdown() {
            const diff = targetDate - new Date();
            if (diff <= 0) {
                cdDays.textContent = '00';
                cdHours.textContent = '00';
                cdMins.textContent = '00';
                cdSecs.textContent = '00';
                return;
            }
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            cdDays.textContent = pad(d);
            cdHours.textContent = pad(h);
            cdMins.textContent = pad(m);
            cdSecs.textContent = pad(s);
        }
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
